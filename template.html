<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winner's Mindset - Keno Predictor</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #121212; color: #ffffff; text-align: center; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: #1e1e1e; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 2px solid #00ffcc; }
        h1 { color: #00ffcc; font-size: 24px; margin-bottom: 10px; }
        .numbers-box { display: flex; justify-content: center; gap: 10px; margin: 25px 0; flex-wrap: wrap; }
        .number { background: #00ffcc; color: #121212; font-weight: bold; font-size: 20px; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 10px #00ffcc; }
        .time { color: #aaaaaa; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>የአሸናፊ ስነ ልቦና</h1>
        <p>የኬኖ ቀጣይ ዙር ሊወጡ የሚችሉ (Hot) ቁጥሮች ትንበያ</p>
        <div class="numbers-box">
            </div>
        <p>የመጨረሻው የሰርቨር ማመሳሰያ ሰዓት፦ <br><span class="time"></span></p>
    </div>
</body>
</html>
